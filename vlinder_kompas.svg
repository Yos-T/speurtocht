<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Achtergrond -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Voelsprieten -->
  <path d="M 370 150 Q 320 50 260 80" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <circle cx="260" cy="80" r="10" fill="black"/>
  <path d="M 430 150 Q 480 50 540 80" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <circle cx="540" cy="80" r="10" fill="black"/>

  <!-- VLEUGELS (Achter het lijfje getekend zodat ze naadloos aansluiten) -->
  <g fill="white" stroke="black" stroke-width="6" stroke-linejoin="round">
    <!-- LINKERVLEUGELS -->
    <!-- Vlak 1 (Boven) -->
    <path d="M 400 400 L 150 100 C 50 150 20 250 40 350 Z" />
    <!-- Vlak 2 (Midden) -->
    <path d="M 400 400 L 40 350 C 30 400 30 450 60 550 Z" />
    <!-- Vlak 3 (Onder) -->
    <path d="M 400 400 L 60 550 C 100 650 200 700 280 650 Z" />

    <!-- RECHTERVLEUGELS -->
    <!-- Vlak 4 (Boven) -->
    <path d="M 400 400 L 650 100 C 750 150 780 250 760 350 Z" />
    <!-- Vlak 5 (Midden) -->
    <path d="M 400 400 L 760 350 C 770 400 770 450 740 550 Z" />
    <!-- Vlak 6 (Onder) -->
    <path d="M 400 400 L 740 550 C 700 650 600 700 520 650 Z" />
  </g>

  <!-- TEKST VAKKEN IN DE VLEUGELS -->
  <g font-family="sans-serif" font-size="28" font-weight="bold" fill="black">
    <text x="180" y="270" text-anchor="middle">_ _</text>
    <text x="160" y="460" text-anchor="middle">_ _</text>
    <text x="230" y="610" text-anchor="middle">_ _</text>
    
    <text x="620" y="270" text-anchor="middle">_ _</text>
    <text x="640" y="460" text-anchor="middle">_ _</text>
    <text x="570" y="610" text-anchor="middle">_ _</text>
  </g>

  <!-- LIJFJE / KLOK (Overlapt de binnenkant van de vleugels voor een perfecte rand) -->
  <circle cx="400" cy="400" r="140" fill="white" stroke="black" stroke-width="6"/>
  <!-- Gat voor de splitpen in het midden -->
  <circle cx="400" cy="400" r="8" fill="white" stroke="black" stroke-width="4"/>

  <!-- Klok getallen -->
  <g font-family="sans-serif" text-anchor="middle" fill="black">
    <text x="400" y="295" font-size="28" font-weight="bold">12</text>
    <text x="455" y="305" font-size="22">1</text>
    <text x="495" y="345" font-size="22">2</text>
    <text x="515" y="408" font-size="28" font-weight="bold">3</text>
    <text x="495" y="470" font-size="22">4</text>
    <text x="455" y="510" font-size="22">5</text>
    <text x="400" y="530" font-size="28" font-weight="bold">6</text>
    <text x="345" y="510" font-size="22">7</text>
    <text x="305" y="470" font-size="22">8</text>
    <text x="285" y="408" font-size="28" font-weight="bold">9</text>
    <text x="305" y="345" font-size="22">10</text>
    <text x="345" y="305" font-size="22">11</text>
  </g>

  <!-- KOP / SYMBOOL PLEK (Precies op de top van het lijfje) -->
  <!-- Stippellijn cirkel -->
  <circle cx="400" cy="200" r="60" fill="white" stroke="black" stroke-width="4" stroke-dasharray="8,6"/>
  <!-- Tekst in de kop -->
  <text x="400" y="195" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold">Plak symbool</text>
  <text x="400" y="215" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold">hier</text>
</svg>